name: Integration Tests

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  # Linux integration tests using Docker driver
  linux-integration:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            kitchen-platform: ubuntu-2204
          # - platform: ubuntu-20.04
          #   kitchen-platform: ubuntu-2004
          # - platform: debian-11
          #   kitchen-platform: debian-11
          - platform: debian-12
            kitchen-platform: debian-12
    name: "Linux (${{ matrix.platform }})"
    uses: ./.github/workflows/_workflow_IT-runner.yaml
    with:
      runs-on: ubuntu-latest
      driver: docker
      kitchen-config: .kitchen.docker.yml
      platform: ${{ matrix.kitchen-platform }}
    secrets:
      SUMO_ACCESS_ID: ${{ secrets.SUMO_ACCESS_ID }}
      SUMO_ACCESS_KEY: ${{ secrets.SUMO_ACCESS_KEY }}

