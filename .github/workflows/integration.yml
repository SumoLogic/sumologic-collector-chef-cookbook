name: Integration Tests

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  # Linux integration tests using exec driver (runs natively on the runner)
  linux-integration:
    name: "Linux (ubuntu-latest)"
    uses: ./.github/workflows/_workflow_IT-runner.yaml
    with:
      runs-on: ubuntu-latest
      driver: exec
      kitchen-config: .kitchen.linux.yml
    secrets:
      SUMO_ACCESS_ID: ${{ secrets.SUMO_ACCESS_ID }}
      SUMO_ACCESS_KEY: ${{ secrets.SUMO_ACCESS_KEY }}

