---
# Kitchen config for running integration tests natively on GitHub Actions
# Ubuntu runners (no Docker). Uses the exec driver to converge directly
# on the host machine.

driver:
  name: exec

provisioner:
  name: chef_zero
  product_version: 18
  install_strategy: always
  chef_license: accept-no-persist
  # Replace the default "sudo -E" with a version that strips GEM_* vars.
  # On GitHub runners the system rubygems env leaks into Chef's embedded
  # Ruby via sudo -E, causing openssl gem version conflicts.
  sudo_command: 'sudo -E env -u GEM_HOME -u GEM_PATH -u GEM_ROOT'

verifier:
  name: inspec

platforms:
  - name: ubuntu

suites:
  - name: default
    data_bags_path: test/integration/data_bags
    run_list:
      - recipe[data-bag-faker]
      - recipe[sumologic-collector::default]
    attributes:
      SUMO_ACCESS_ID: <%= ENV['SUMO_ACCESS_ID'] %>
      SUMO_ACCESS_KEY: <%= ENV['SUMO_ACCESS_KEY'] %>
